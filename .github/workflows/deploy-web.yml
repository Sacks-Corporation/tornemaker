name: Deploy web to GitHub Pages

on:
  push:
    branches: [main]
    paths: ['web/**']
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Un solo deploy a la vez; si llega un push nuevo se cancela el anterior.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - run: npm ci

      - run: npm run build
        env:
          # TODO: reemplazar por la URL real del servicio en Render una vez creado.
          VITE_API_BASE_URL: https://tornemaker.onrender.com/api 
          VITE_GOOGLE_CLIENT_ID: 303735161618-0621kn7ih616a6gt0m0r6iifsrggunj0.apps.googleusercontent.com

      # GitHub Pages no conoce las rutas de la SPA: al pedir /tornemaker/login
      # devolvería 404. Servir index.html como 404.html hace que cualquier ruta
      # cargue la app y React Router resuelva el path.
      - run: cp dist/index.html dist/404.html

      - uses: actions/upload-pages-artifact@v3
        with:
          path: web/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
